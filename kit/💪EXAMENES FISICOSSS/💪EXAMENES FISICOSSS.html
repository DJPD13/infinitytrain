    <h1 dir="auto">normal</h1>
    <p dir="auto">PACIENTE EN BUENAS CONDICIONES GENERALES, ALERTA, CONCIENTE, AFEBRIL, HIDRATADO</p>
    <p dir="auto">PIEL SIN LESIONES.</p>
    <p dir="auto">CABEZA: NORMOCEFALO, SIN LESIONES,OTOSCOPIA BILATERAL NORMAL.</p>
    <p dir="auto">OJOS: CONJUNTIVAS NORMOCROMICAS, ESCLERAS ANICTERICAS, ISOCORIA NORMOREACTIVA, MOVIMIENTOS OCULARES NORMALES</p>
    <p dir="auto">CAVIDAD ORAL Y OROFARINGE: MUCOSA NASAL NORMAL; MUCOSA ORAL HUMEDA, OROFARINGE LIMPIA.</p>
    <p dir="auto">CUELLO: MOVIL, NO DOLOROSO, NO SE PALPAN MASAS NI ADENOMEGALIAS.</p>
    <p dir="auto">TORAX: SIMETRICO, EXPANSIBILIDAD NORMAL, SIN RETRACCIONES, PERCUSION NORMAL.RUIDOS CARDIACOS RITMICOS, NO AUSCULTO SOPLOS; MURMULLO VESICULAR CONSERVADO, NO SE AUSCULTAN AGREGADOS.</p>
    <p dir="auto">ABDOMEN BLANDO, NO DOLOROSO A LA PALPACIÓN, PERISTALSIS PRESENTE, NO SE PALPAN MASAS NI VISCEROMEGALIAS, SIN SIGNOS DE IRRITACION PERITONEAL.</p>
    <p dir="auto">GENITOURINARIO NO EVALUADO. </p>
    <p dir="auto">EXTREMIDADES SIMETRICAS, SIN EDEMAS, MOVILES, PERFUSION DISTAL MENOR A 2 SEGUNDOS, PULSOS DISTALES PRESENTES.</p>
    <p dir="auto">OSTEOMUCULAR: SIN DEFORMIDADES, ARCOS DE MOVILIDAD CONSERVADOS.</p>
    <p dir="auto">NEUROLOGICO: SIN DEFICIT MOTOR NI SENSITIVO APARENTE, FUERZA 5/5 EN 4 EXTREMIDADES, SENSIBILIDAD CONSERVADA, NO SIGNOS MENINGEOS, NO FOCALIZACIÓN</p>

    <ul>
      <li dir="auto">descartar meningitis
        <ul>
          <li dir="auto">rigidez nucal</li>
          <li dir="auto">signos de exantema petequial o purpúrico presentes en el 73% y 20% de las meningococcemias</li>
          <li dir="auto">maniobra de sacudida cefálica (Jolt test)
            <ul>
              <li dir="auto">consiste en efectuar sacudidas enérgicas de la cabeza en el plano horizontal dos a tres veces por segundo (por lo menos tres veces consecutivas)con empeoramiento del dolor de cabeza (sensibilidad del 97% y especificidad del 60% para detección de meningitis bacteriana). </li>
            </ul>
          </li>
          <li dir="auto">kernig y brudzinski</li>
          <li dir="auto">Descartar infección por vectores
            <ul>
              <li dir="auto">inyección conjuntival<br>
                biblio</li>
            </ul>
          </li>
        </ul>
      </li>

    <h1 dir="auto">Neuro</h1>
    <ul>
      <li dir="auto">cefalea, descartar encefalopatia hipertensiva y
        <ul>
          <li dir="auto">FC</li>
        </ul>
      </li>
      <li dir="auto">descartar
        <ul>
          <li dir="auto">acv isquemico
            <ul>
              <li dir="auto">Debilidad focal </li>
              <li dir="auto">Hemiparesia </li>
              <li dir="auto">Disartria </li>
              <li dir="auto">Parálisis de la mirada horizontal </li>
              <li dir="auto">Disfunción/ negligencia visoespacial </li>
              <li dir="auto">Síntomas focales en distribución anatómica vascular </li>
              <li dir="auto">Desviación ocular</li>
              <li dir="auto">DESCRATRA QUE NO SEA EVC por hta</li>
              <li dir="auto">ptosis palpebral</li>
            </ul>
          </li>
          <li dir="auto">pares craneales
            <ul>
              <li dir="auto">OCULMOTOR
                <ul>
                  <li dir="auto">PTOSIS PALPEBRAL (músculo elevador del paladar superior)</li>
                  <li dir="auto">PUPILA DILATADA</li>
                  <li dir="auto">DESVIACIÉN HACIA ABAJO Y HACIA FUERA INCAPACIDAD PARA LA ELEVACIÉN Y LA APROXIMACION (recto lateral y los músculos oblicuos superiores,)</li>
                </ul>
              </li>
              <li dir="auto">FACIAL
                <ul>
                  <li dir="auto">BORRAMIENTO DEL SURCO NASOLABIAL IPSILATERAL (CENTRAL)</li>
                  <li dir="auto">INCAPACIDAD PARA EL CIERRE PALPEBRAL Y DISMINUCIÓN DE LAS ARRUGAS DE LA FRENTE AL ELEVAR LAS CEJAS. (PERIFERICO)</li>
                </ul>
              </li>
              <li dir="auto">
                <ul>
                  <li dir="auto">LENGUA (HIPOGLOSO)</li>
                  <li dir="auto">INCAPACIDAD PARA PROTRUIR LA LENGUA (PARESIA BILATERAL)</li>
                  <li dir="auto">ARQUEAMIENTO DE LA LENGUA AL PROTRUIR LA LENGUA (PARESIA UNILATERAL)</li>
                </ul>
              </li>
              <li dir="auto"><span width="441"><img width="441" src="app://4f9468bcde506238056c15b20a562ee30dd9/C:/Users/jpdur/SYNCRIGTH/OneDrive/OBSIDIAN/NOTAS/%F0%9F%92%AAEXAMENES%20FISICOSSS/IMAGENES%20EX%20FIS/pares%20craneales%20y%20sus%20reflejos.png?1775958431563"></span></li>
            </ul>
          </li>
          <li dir="auto">acv posterior
            <ul>
              <li dir="auto">nistagmo</li>
              <li dir="auto">la prueba de impulso cefálico</li>
              <li dir="auto">el reconocimiento de un mal alineamiento ocular vertical (desviación oblicua, skew en inglés)</li>
