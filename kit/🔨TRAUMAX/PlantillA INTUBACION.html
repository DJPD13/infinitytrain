    <p dir="auto">SE RECIBE PACIENTE MASCULINO DE xx AÑOS DE EDAD EN SALA DE REANIMACIÓN TRAIDO POR BOMBEROS EN TABLA RIGIDA Y CON INMOVILIZACIÓN CERVICAL POR POLITRAUMATISMO SECUNDARIO A ACCIDENTE DE TRÁNSITO EN CALIDAD DE CONDUCTOR DE MOTOCICLETA PORTANDO CASCO.</p>
    <p dir="auto">PASAJERO DE MOTO FUE EYECTADO FUERA DEL VEHICULO // MURIO EN EL LUGAR DEL EVENTO //</p>
    <p dir="auto">PACIENTE NO PRESENTA SIGNOS DE ESTADO DE EMBRIAGUEZ CLINICA</p>
    <p dir="auto">BAJO ESTADO DE EMBRIAGUEZ SIN ACCESORIOS DE SEGURIDAD. AL INGRESO DURANTE LA NOCHE SEGÚN HISTORIA CLÍNICA SOMNOLIENTO, CON ALIENTO ALCOHÓLICO FRANCO, CON EVIDENCIA DE TRAUMA CRANEOENCEFÁLICO QUIEN POR INGESTA DE ALCOHOL DIFICULTA VALORACIÓN DE ESTADO NEUROLÓGICO, CON CONTUSIONES EN TÓRAX Y ABDOMEN. DURANTE LA MAÑANA PACIENTE CON DETERIORO DEL ESTADO DE CONCIENCIA GLASGOW 7/15 DADO APERTURA OCULAR AL DOLOR (2 PUNTOS), RESPUESTA VERBAL; SONIDOS INAPROPIADOS (2 PUNTOS), RESPUESTA AL DOLOR: FLEXIONA AL DOLOR (3 PUNTOS) ADEMÁS, DOLOR ABDOMINAL GENERALIZADO.</p>
    <p dir="auto">SE CONSIDERA PACIENTE CON TRAUMA CRANEOENCEFÁLICO SEVERO + TRAUMA DE TÓRAX Y ABDOMEN CERRADO. CON EL FIN DE BRINDAR NEUROPROTECCIÓN SE CONSIDERA ASEGURAMIENTO DE LA VÍA AÉREA. </p>
    <p dir="auto">SE INDICA PREMEDICACIÓN CON FENTANYL 200 MCG, MIDAZOLAM 10 MG.<br>
      PACIENTE EN APNEA, NO SE DISPONE DE RELAJANTE MUSCULAR DE CORTA ACCIÓN.<br>
      PACIENTE CON DIFÍCIL VENTILACIÓN CON MÁSCARA FACIAL, NO SATURACIÓN ÓPTIMAS PESE ADECUADO SELLO. SE REALIZA LARINGOSCOPIA DIRECTA SIN OBSERVAR CUERDAS VOCALES, SE CORRIGE TÉCNICA DE LARINGOSCOPIA SIN EMBARGO CORMACK 4. </p>
    <p dir="auto">SE CONSIDERA RELAJACIÓN MUSCULAR CON VECURONIO (NO INDICADO EN TRAUMA NI SECUENCIA DE INTUBACIÓN RÁPIDA POR LARGA ACCIÓN PERO ÚNICO DISPONIBLE), SE INTENTA NUEVAMENTE LARINGOSCOPIA DIRECTA Y MANIOBRA DE BURP SIN VISUALIZACIÓN DE CUERDAS<br>
      EDEMA GLÓTICO POR LO QUE INDICA 200 MG DE HIDROCORTISONA<br>
      SE INTRODUCE TUBO A CIEGAS CON RETORNO DE SECRECIÓN EN CUNCHO DE CAFÉ, SIN MURMULLO VESICULAR A LA AUSCULTACIÓN, POR LO QUE SE CONSIDERA POSICIÓN ESOFÁGICA, SIN EMBARGO DADA IMPOSIBILIDAD PARA LA INTUBACIÓN SE DEJA TUBO EN ESOFAGO Y SE INTENTA NUEVO PASO DE TUBO SIN UBICACIÓN DE TRÁQUEA. </p>
    <p dir="auto">SE REALIZA NUEVAMENTE MÁSCARA FACIAL SIN LOGRAR HERMETICIDAD, NO LOGRA RECUPERARSE SATURACIONES ÓPTIMAS. NOS ENCONTRAMOS CON UN PACIENTE QUE NO SE PUEDE VENTILAR NI SE PUEDE INTUBAR, SE INTENTA LARINGOSCOPIA DIRECTA POR MÉDICO DIFERENTE SIN LOGRAR INTUBACIÓN OROTRAQUEAL,CONTINÚA PACIENTE DESATURADO. A LAS 11+10 PACIENTE PRESENTA BRADICARDIA EXTREMA CON POSTERIOR PASO ASISTOLIA. SE ACTIVA CÓDIGO AZUL Y SE INICIA MANIOBRAS DE REANIMACIÓN AVANZADA, COMPRESIONES TORÁCICAS DE ALTA CALIDAD, DADA IMPOSIBILIDAD DE IOT SE REALIZAN 30 COMPRESIONES Y 2 VENTILACIONES POR MÁSCARA FACIAL, SE INICIA ADRENALINA CADA 5 MINUTOS, SE COMPRUEBA RITMO CADA 2 MINUTOS, TODO EL TIEMPO EN ACTIVIDAD ELÉCTRICA SIN PULSO, PACIENTE SIN RESPUESTA A RCP, CONTINUA SECRECIÓN EN CUNCHO DE CAFÉ POR CAVIDAD ORAL PROBABLEMENTE SECUNDARIAS A TRAUMA DE ABDOMEN CERRADO. A LAS 11+25 SE DETIENEN MANIOBRAS DE REANIMACIÓN, SE DECLARA HORA DE LA MUERTA. SE INFORMA A FAMILIARES Y SE INDICA NECROPSIA MÉDICO LEGAL AL TRATARSE DE MUERTE VIOLENTA EN ACCIDENTE DE TRÁNSITO.</p>
